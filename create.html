<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Trip</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <div class="header-row">
    <button class="back-btn" id="backBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2D3135" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left-icon lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h2 class="title">Create Trip</h2>
  </div>

  <!-- Trip Name -->
  <div class="field">
    <label>Trip Name</label>
    <input id="tripName" autocomplete="off"/>
  </div>

  <!-- Currency -->
  <div class="field">
    <label>Currency</label>
    <select id="currency"></select>
  </div>

  <!-- Members -->
  <div class="field">
    <label>Members</label>
    <div id="memberList"></div>
  </div>

  <!-- Button -->
  <button class="btn primary" id="createTrip">
    Create Trip
  </button>

</div>

<!-- Loading -->
<div id="loadingOverlay" class="overlay hidden">
  <div class="spinner"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalText" style="padding: 10px 0px 20px 0px;"></h3>
    <button id="modalBtn" class="btn primary">OK</button>
  </div>
</div>

<script type="module" src="create.js"></script>

</body>
</html>
