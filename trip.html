<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trips Spliter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <div class="header-row">
    <button class="back-btn" id="backBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2D3135" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
        </svg>
    </button>
    <div class="header-title">
        <h2 id="tripTitle" class="title">Trip</h2>
    </div>
  </div>

  <div id="tripMeta" style="margin-top:12px; margin-bottom:18px; display: flex; justify-content: space-between;">
    <div id="tripMembers"></div>
    <div id="tripTotal" style="font-weight:600;"></div>
  </div>
  <button id="closeTripBtn" class="btn" style="display: none;">
    End Trip
  </button>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="expenses">Expenses</div>
    <div class="tab" data-tab="settle">Settle Up</div>
    <div class="tab" data-tab="summary">Summary</div>
  </div>

  <!-- Add Expense -->
  <button id="addBtn" class="btn primary top-btn" style="display: none;">
    + Add Expense
  </button>

  <!-- Content -->
  <div id="expensesTab"></div>
  <div id="settleTab" style="display:none"></div>
  <div id="summaryTab" style="display:none">
    <!-- Total -->
    <div class="card summary-card">
      <div class="summary-title">Total Trip Cost</div>
      <div id="summaryTotal" class="summary-total"></div>
      <div id="summaryCount" class="summary-sub"></div>
    </div>

    <!-- Category -->
    <div class="section-title">By Category</div>
    <div id="summaryCategory"></div>
  </div>

</div>



<!-- Loading -->
<div id="loadingOverlay" class="overlay hidden">
  <div class="spinner"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalText"></h3>

    <div class="modal-actions">
      <button id="modalCancel" class="btn btn-secondary">Cancel</button>
      <button id="modalConfirm" class="btn primary">Confirm</button>
    </div>
  </div>
</div>



<script type="module" src="trip.js"></script>

</body>
</html>
