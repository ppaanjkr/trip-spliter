<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trips Spliter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff6fa5" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plane-icon lucide-plane"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
    </div>
    <h1>Trips</h1>
  </div>

  <!-- Create Trip -->
  <button class="btn primary top-btn" onclick="goCreateTrip()">
    + Create Trip
  </button>

  <!-- Trip List -->
  <div id="tripList"></div>

</div>

<!-- Loading -->
<div id="loadingOverlay" class="overlay hidden">
  <div class="spinner"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalText"></h3>

    <div class="modal-actions">
      <button id="modalCancel" class="btn btn-secondary">Cancel</button>
      <button id="modalConfirm" class="btn primary">Confirm</button>
    </div>
  </div>
</div>


<script  src="app.js"></script>

</body>
</html>
